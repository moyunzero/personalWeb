<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring — the "0 / zero" shape -->
  <circle cx="20" cy="20" r="16.5" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Tilted inner ellipse — zero inside zero, also the round body of 墨 -->
  <ellipse cx="20" cy="19" rx="6.5" ry="10" stroke="white" stroke-width="2" fill="none" transform="rotate(-12 20 19)"/>
  <!-- Horizontal base stroke — 墨 bottom radical (土) -->
  <line x1="11.5" y1="31" x2="28.5" y2="31" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Short center vertical — top of 墨 (黑 top dot) -->
  <line x1="20" y1="5.5" x2="20" y2="8.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
